name: Android Release Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Set minSdkVersion to 26
        run: sed -i 's/minSdkVersion = 24/minSdkVersion = 26/' android/variables.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set version code and name
        run: |
          sed -i "s/versionCode 1/versionCode $((  ${{ github.run_number }} + 100 ))/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$(node -p "require('./package.json').version")\"/" android/app/build.gradle

      - name: Remove all sensitive permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - <<'EOF'
          import re

          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()

          # Add tools namespace if not present
          if 'xmlns:tools' not in content:
              content = content.replace(
                  'xmlns:android="http://schemas.android.com/apk/res/android"',
                  'xmlns:android="http://schemas.android.com/apk/res/android"\n    xmlns:tools="http://schemas.android.com/tools"'
              )

          # All health + sensitive permissions to forcibly remove
          permissions = [
              "android.permission.health.READ_ACTIVE_CALORIES_BURNED",
              "android.permission.health.READ_DISTANCE",
              "android.permission.health.READ_ELEVATION_GAINED",
              "android.permission.health.READ_EXERCISE",
              "android.permission.health.READ_EXERCISE_ROUTE",
              "android.permission.health.READ_FLOORS_CLIMBED",
              "android.permission.health.READ_STEPS",
              "android.permission.health.READ_TOTAL_CALORIES_BURNED",
              "android.permission.health.READ_VO2_MAX",
              "android.permission.health.READ_HEART_RATE",
              "android.permission.health.READ_RESPIRATORY_RATE",
              "android.permission.health.READ_BLOOD_OXYGEN",
              "android.permission.health.READ_BLOOD_PRESSURE",
              "android.permission.health.READ_BLOOD_GLUCOSE",
              "android.permission.health.READ_BODY_FAT",
              "android.permission.health.READ_BODY_TEMPERATURE",
              "android.permission.health.READ_BODY_WATER_MASS",
              "android.permission.health.READ_BONE_MASS",
              "android.permission.health.READ_HEIGHT",
              "android.permission.health.READ_LEAN_BODY_MASS",
              "android.permission.health.READ_NUTRITION",
              "android.permission.health.READ_SLEEP",
              "android.permission.health.READ_SPEED",
              "android.permission.health.READ_WEIGHT",
              "android.permission.health.WRITE_ACTIVE_CALORIES_BURNED",
              "android.permission.health.WRITE_DISTANCE",
              "android.permission.health.WRITE_EXERCISE",
              "android.permission.health.WRITE_HEART_RATE",
              "android.permission.health.WRITE_STEPS",
          ]

          removals = '\n'.join(
              f'    <uses-permission android:name="{p}" tools:node="remove"/>'
              for p in permissions
          )

          content = content.replace('</manifest>', f'\n{removals}\n</manifest>')

          with open(path, 'w') as f:
              f.write(content)

          print("Done — all health permissions marked for removal")
          EOF

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4.6.2
        with:
          name: fitlog-release-${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
